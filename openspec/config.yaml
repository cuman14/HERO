# ─────────────────────────────────────────────────────────────────────────────
# H.E.R.O — Official OPSX Configuration
# High Performance Event Result Organizer
# ─────────────────────────────────────────────────────────────────────────────
schema: spec-driven

# ── Global Context (Inyectado en cada prompt del agente) ──────────────────────
context: |
  Project: H.E.R.O. (High Performance Event Result Organizer).
  Deadline: 2026-04-11 (Demo BOX Madrid).

  Stack Tecnológico:
  - NX Monorepo, Angular 21 (Standalone, Signals, inject(), OnPush).
  - State: @ngrx/signals (Signal Store).
  - Styling: Tailwind CSS v4.
  - Backend: Supabase (PostgreSQL 17.6).
  - Testing: Vitest + Angular Testing Library.

  Arquitectura (Hexagonal + DDD):
  - domain: Modelos puros e interfaces. Cero dependencias.
  - application: Facades y Signal Stores. Gestiona el estado.
  - infrastructure: Repositorios Supabase y Mappers (Streams a Signals).
  - feature: Páginas de Angular, Resolvers funcionales y Providers.
  - ui: Componentes "dumb" presentacionales (Stitch-driven).

  Reglas de Oro:
  - Los componentes SOLO llaman a Facades o Signal Stores. Prohibido acceso a Repositorios.
  - Inyección: Exclusivamente mediante inject(). Prohibidos constructores.
  - Reactividad: Uso de input(), output() y computed(). No RxJS en componentes.

# ── Rules by Artifact (Instrucciones de flujo OPSX) ───────────────────────────
rules:
  proposal:
    - "Git Action: Crear automáticamente la rama 'feature/<scope>-<short-description>' antes de redactar el proposal."
    - 'Stitch Check: Verificar si el servidor MCP de Stitch está activo para acceder al diseño visual.'
    - 'Scope: Definir contextos delimitados afectados (auth, heat, score, athlete, event).'

  specs:
    - 'Format: Requerimientos funcionales en GIVEN/WHEN/THEN.'
    - 'Terminology: Respetar glosario (WOD, AMRAP, For Time, Heat, RX, Scaled).'
    - 'UX: Garantizar touch targets de 48x48px para la App de Jueces.'

  design:
    - 'Descomponetización: El agente DEBE listar todos los componentes UI (Dumb) y Feature necesarios a partir del diseño en Stitch/MCP.'
    - 'Layering: Definir primero la interfaz en Domain y la lógica de estado en Application antes que la UI.'
    - 'Mock Strategy: Especificar el uso de datos estáticos (stubs) para la fase inicial de implementación.'
    - 'MCP Sync: Consultar Design Tokens y mapeo de señales (Signals) desde el servidor MCP de Stitch.'

  tasks:
    - 'Fase 1 (Domain): Crear modelos y tipos en libs/contexts/*/domain.'
    - 'Fase 2 (Application): Crear Facades y Signal Stores con datos MOCK.'
    - 'Fase 3 (Feature & UI): Crear componentes (usando MCP de Stitch) e integrarlos con las Facades mockeadas.'
    - 'Checkpoint Visual: Al finalizar la Fase 3, el agente debe detenerse y pedir validación visual del usuario en el navegador.'
    - 'Fase 4 (Infrastructure): Tras la validación, implementar Repositorios reales, Mappers y llamadas a Supabase.'
    - 'Quality: Cada tarea de lógica debe incluir su archivo .spec.ts co-localizado.'

# ── Commits & Scopes ──────────────────────────────────────────────────────────
commits:
  types: [feat, fix, refactor, test, chore]
  scopes:
    [
      admin,
      judge,
      leaderboard,
      heat,
      score,
      athlete,
      auth,
      event,
      infra,
      ui,
      nx,
    ]

# ── Glosario de Dominio ───────────────────────────────────────────────────────
glossary:
  WOD: 'Workout of the Day'
  AMRAP: 'As Many Reps As Possible (higher_is_better)'
  For Time: 'Completar en el menor tiempo posible (lower_is_better)'
  Heat: 'Grupo de atletas compitiendo simultáneamente'
  RX: 'Nivel estándar de dificultad'
  Scaled: 'Nivel adaptado de dificultad'
