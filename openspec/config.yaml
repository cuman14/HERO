# ─────────────────────────────────────────────────────────────────────────────
# H.E.R.O — OpenSpec Configuration (OPSX Standard)
# High Performance Event Result Organizer
# ─────────────────────────────────────────────────────────────────────────────
schema: spec-driven

context: |
  Project: H.E.R.O (High Performance Event Result Organizer).
  Deadline: 2026-04-11 (Demo BOX Madrid).

  Tech Stack:
  - Monorepo NX con Angular 21 (Standalone, Signals, inject()).
  - State: @ngrx/signals (Component Store / Facade).
  - Styling: Tailwind CSS v4.
  - Backend: Supabase (PostgreSQL 17.6) con RLS activo.
  - Testing: Vitest + Angular Testing Library.

  Architecture (DDD + Hexagonal):
  - domain: Modelos puros, interfaces y tipos de base de datos.
  - application: Facades y Signal Stores. Depende solo de domain.
  - infrastructure: Repositorios e implementaciones de Supabase.
  - feature: Componentes de página, Resolvers y Providers.
  - ui: Componentes "dumb" (presentacionales) con OnPush.

rules:
  proposal:
    - 'Indicar siempre los contextos delimitados (Bounded Contexts) afectados.'
    - 'Declarar explícitamente qué queda fuera del alcance (out-of-scope).'

  specs:
    - 'Criterios de aceptación en formato GIVEN/WHEN/THEN.'
    - 'Respetar el glosario técnico (WOD, AMRAP, For Time, Heat, RX/Scaled).'

  design:
    - "Component Isolation: Los componentes de la capa 'feature' solo pueden interactuar con Service Facades o Signal Stores. Queda estrictamente prohibido el acceso directo a Repositorios o SDK de Supabase desde los componentes."
    - 'Data Pre-fetching: Usar Functional Resolvers (ResolveFn) para toda carga de datos vinculada a rutas. Esto asegura que los componentes OnPush reciban la data mediante el input binding o el ActivatedRoute sin parpadeos de UI (flicker).'
    - "Reactive Data Flow: Los Mappers en 'infrastructure' deben transformar Streams de Supabase Realtime en Signals antes de entregarlos a la capa de aplicación."
    - 'Inyección: Usar exclusivamente la función inject(). Prohibido el uso de constructores.'
    - 'Prohibido el uso de Angular Material o NgModules.'

  tasks:
    - 'Cada tarea de lógica debe generar su correspondiente .spec.ts co-localizado.'
    - 'Granularidad: Máximo un archivo por tarea. Si supera las 100 líneas, dividir.'
    - 'Commits: <type>(<scope>): <description>.'

glossary:
  WOD: 'Workout of the Day'
  AMRAP: 'As Many Reps As Possible (higher_is_better)'
  For Time: 'Complete fast (lower_is_better)'
  Heat: 'Grupo de atletas compitiendo simultáneamente'
