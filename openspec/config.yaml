# ─────────────────────────────────────────────────────────────────────────────
# H.E.R.O — Official OPSX Project Configuration (Flexible Edition)
# ─────────────────────────────────────────────────────────────────────────────
schema: spec-driven

# ── Global Context (Arquitectura, Stack y Reglas de Oro) ─────────────────────
context: |
  Project: H.E.R.O. (High Performance Event Result Organizer).
  Deadline: 2026-04-11 (Demo BOX Madrid).

  Stack & Architecture:
  - NX Monorepo, Angular 21 (Signals, inject(), OnPush), Tailwind v4.
  - Pattern: Hexagonal/DDD (domain -> application -> feature -> infrastructure).
  - Database: Supabase. Types in 'libs/types/src/database.types.ts'.

  Architectural Guardrails:
  - Component communication: ONLY via Service Facades/Signal Stores.
  - Dependency Injection: Use inject() function only. No constructors.
  - Reactivity: Signal-based inputs/outputs. No RxJS en componentes.
  - Git: Branches must follow 'feature/<scope>-<description>'.

  Glossary: WOD, AMRAP, For Time, Heat, RX, Scaled, Bib Number.

# ── Rules by Artifact (Instrucciones de Flujo OPSX) ──────────────────────────
rules:
  proposal:
    - "Git: Crear rama 'feature/<scope>-<description>' antes de empezar."
    - 'STITCH/DESCRIPTION EVALUATION: El agente debe evaluar la naturaleza del cambio:'
    - "1. Si es un desarrollo de pantalla nueva o rediseño complejo y NO hay bloque '## Stitch Instructions': PREGUNTAR por los IDs de Stitch."
    - '2. Si el cambio es una mejora lógica, ajuste de infraestructura o un cambio visual descrito detalladamente por el usuario: PROCEDER usando la descripción de texto como fuente de verdad.'
    - 'Action: Si se proporcionan IDs de Stitch, usar el MCP para descargar imágenes y código fuente (curl -L).'

  specs:
    - 'Format: GIVEN/WHEN/THEN. UX: Touch targets 48x48px (Judge App).'

  design:
    - 'Decomposition: Listar Dumb Components (UI), Smart Components (Feature) y Domain Models.'
    - 'Si hay Stitch: Usar los tokens y estructura visual del diseño.'
    - 'Si es por Descripción: El agente debe proponer una estructura visual coherente con Tailwind v4 basada en el texto del usuario.'
    - 'Mock Strategy: Definir stubs de datos estáticos para las fases iniciales.'

  tasks:
    - 'Fase 1 (Domain): Modelos e interfaces puras.'
    - 'Fase 2 (Application): Stores con MOCK DATA.'
    - 'Fase 3 (UI & Feature): Implementar componentes (vía Stitch o Descripción) y conectar a Mocks.'
    - 'STOP_POINT: Detenerse para VALIDACIÓN VISUAL tras la Fase 3. No continuar sin OK.'
    - 'Fase 4 (Infrastructure): Tras el OK, implementar Repositorios y Mappers reales.'
    - 'Commit: <type>(<scope>): <description>.'
