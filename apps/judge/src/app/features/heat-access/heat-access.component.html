<div
  class="split-screen-container bg-hero-bg font-sans text-slate-200 antialiased selection:bg-violet-600/30"
>
  <!-- Step Progress Indicator -->
  <div
    class="fixed top-8 left-0 right-0 flex justify-center pointer-events-none z-10"
  >
    <div
      class="flex gap-2 p-1.5 bg-hero-surface/80 backdrop-blur-md rounded-full border border-hero-border shadow-sm"
    >
      <div class="h-1.5 w-6 rounded-full bg-slate-700"></div>
      <div class="h-1.5 w-10 rounded-full bg-violet-600"></div>
      <div class="h-1.5 w-1.5 rounded-full bg-slate-700"></div>
      <div class="h-1.5 w-1.5 rounded-full bg-slate-700"></div>
    </div>
  </div>

  <!-- Top Section: Logo and Heat Code -->
  <section
    class="flex-1 flex flex-col items-center justify-center px-6 border-b border-hero-border bg-hero-surface/20"
  >
    <header class="mb-12 flex flex-col items-center">
      <div class="flex items-center gap-3 mb-2">
        <lib-icon
          name="flag"
          variant="solid"
          iconClass="text-violet-600 w-10 h-10"
        />
        <h1 class="text-2xl font-bold tracking-tight text-white">ScoreApp</h1>
      </div>
      <p
        class="font-mono text-[10px] font-bold tracking-[0.2em] text-slate-400 dark:text-slate-500 uppercase"
      >
        Interfaz del Juez
      </p>
    </header>

    <div class="w-full max-w-sm">
      <lib-input
        id="heat-code"
        label="Código de Heat"
        [value]="heatCode()"
        status="success"
        icon="check-circle"
      />
    </div>
  </section>

  <!-- Bottom Section: Judge Identification -->
  <section
    class="flex-1 flex flex-col items-center justify-center px-6 bg-hero-bg"
  >
    <div class="w-full max-w-sm space-y-8">
      <div class="flex flex-col gap-4 text-center">
        <h2 class="text-xl font-semibold text-slate-200">
          Identificación del Juez
        </h2>
        <p class="text-sm text-slate-400 px-8">
          Confirme su nombre para acceder al panel de puntuación del evento.
        </p>
      </div>

      <div class="space-y-6">
        <lib-input
          id="judge-name"
          label="Nombre del Juez"
          placeholder="Ej: María López"
          [value]="judgeName()"
          [status]="judgeName() ? 'active' : 'neutral'"
          (valueChange)="updateJudgeName($event)"
        />

        <lib-button
          [loading]="isSubmitting()"
          [disabled]="!judgeName()"
          class="w-full"
          (clicked)="onSignIn()"
        >
          Iniciar Sesión
          <lib-icon name="arrow-right" iconClass="w-5 h-5 font-bold" />
        </lib-button>
      </div>

      <!-- Footer: Connection Status -->
      <div class="flex items-center justify-center gap-3 py-4">
        <div
          class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 dark:bg-emerald-500/10 rounded-full border border-emerald-100 dark:border-emerald-500/20"
        >
          <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
          <span
            class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider"
            >Sistema Conectado</span
          >
        </div>
      </div>
    </div>
  </section>
</div>
