name: Performance - Judge App

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: team_sMmJmobd92vIBFKdJ2KxbtcE
  VERCEL_PROJECT_ID: prj_fdR9nYPXdOMWgeCoWXkZWkYvNPDv

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build judge app
        run: npx nx build judge --configuration=production

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (preview)
        id: deploy
        continue-on-error: true
        run: |
          cp apps/judge/vercel.json dist/apps/judge/vercel.json
          cd dist/apps/judge
          npx vercel --prebuilt --public --token=${{ secrets.VERCEL_TOKEN }} --scope=$VERCEL_ORG_ID 2>&1 | tee /tmp/vercel-output.txt
          DEPLOY_URL=$(grep -oP '(https?://[^\s"]+\.vercel\.app)' /tmp/vercel-output.txt | head -1)
          if [ -n "$DEPLOY_URL" ]; then
            echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo "Deployed to: $DEPLOY_URL"
          else
            echo "url=failed" >> $GITHUB_OUTPUT
            echo "Vercel deploy failed, will fallback to localhost"
          fi

      - name: Run Lighthouse CI
        run: |
          if [ "${{ steps.deploy.outputs.url }}" != "failed" ] && [ -n "${{ steps.deploy.outputs.url }}" ]; then
            echo "Running LHCI against Vercel preview: ${{ steps.deploy.outputs.url }}"
            npx lhci autorun --collect.url=${{ steps.deploy.outputs.url }} --collect.startServerCommand= --upload.target=temporary-public-storage
          else
            echo "Vercel deploy unavailable, running LHCI against localhost"
            npx lhci autorun --upload.target=temporary-public-storage
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
