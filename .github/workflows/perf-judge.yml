name: Judge Performance

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/judge/**'
      - 'libs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: team_sMmJmobd92vIBFKdJ2KxbtcE

jobs:
  bundle-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build judge app
        run: npx nx build judge --configuration=production

      - name: Generate bundle report (visualizer)
        run: |
          mkdir -p perf-reports
          npx vite-bundle-visualizer --config apps/judge/vite.config.mts \
            -o perf-reports/bundle-report.html

      - name: Generate bundle summary
        run: |
          node << 'EOF'
            const fs = require('fs');
            const path = require('path');
            const zlib = require('zlib');
            const dir = 'dist/apps/judge/assets';
            const files = fs.readdirSync(dir).filter(f => /\.(js|css)$/.test(f));
            let md = '## Bundle Report\n\n| Chunk | Size | Gzip |\n|-------|------|------|\n';
            let totalRaw = 0, totalGzip = 0;
            files.sort().forEach(f => {
              const buf = fs.readFileSync(path.join(dir, f));
              const rawKB = buf.length / 1024;
              const gzipKB = zlib.gzipSync(buf).length / 1024;
              const name = f.replace(/-[a-zA-Z0-9_]+(-[a-z]+)?\.([a-z]+)$/, (m, s, ext) => '-*.' + ext);
              md += '| ' + name + ' | ' + rawKB.toFixed(1) + ' KB | ' + gzipKB.toFixed(1) + ' KB |\n';
              totalRaw += rawKB;
              totalGzip += gzipKB;
            });
            md += '| **Total** | **' + totalRaw.toFixed(1) + ' KB** | **' + totalGzip.toFixed(1) + ' KB** |\n';
            fs.writeFileSync('perf-reports/summary.md', md);
            fs.writeFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          EOF

      - name: Upload bundle reports
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report-${{ github.sha }}
          path: perf-reports/
          retention-days: 90

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build judge app
        run: npx nx build judge --configuration=production

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (preview)
        id: deploy
        env:
          VERCEL_PROJECT_ID: prj_fdR9nYPXdOMWgeCoWXkZWkYvNPDv
        run: |
          cp apps/judge/vercel.json dist/apps/judge/vercel.json
          cd dist/apps/judge
          DEPLOY_OUTPUT=$(vercel --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https?://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Run Lighthouse CI against Vercel preview
        shell: bash
        run: |
          HEADERS='{"x-vercel-protection-bypass":"${{ secrets.VERCEL_BYPASS_SECRET }}"}'
          npx lhci autorun \
            --collect.url='${{ steps.deploy.outputs.url }}' \
            --collect.startServerCommand= \
            --collect.settings.extraHeaders="$HEADERS" \
            --upload.target=temporary-public-storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Lighthouse metrics
        if: always()
        run: |
          node << 'EOF'
            const fs = require('fs');
            const dir = '.lighthouseci';
            const files = fs.readdirSync(dir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            if (!files.length) { console.log('No LHR files found'); process.exit(0); }
            const lhr = JSON.parse(fs.readFileSync(dir + '/' + files[0], 'utf8'));
            const audits = lhr.audits;
            const cat = lhr.categories;
            const fmt = (v) => typeof v === 'number' ? v.toFixed(1) : 'N/A';
            const md = '\n## Lighthouse\n\n' +
              '| Metric | Value |\n|--------|-------|\n' +
              '| Performance | ' + Math.round(cat.performance.score * 100) + ' |\n' +
              '| FCP | ' + fmt(audits['first-contentful-paint']?.numericValue) + ' ms |\n' +
              '| LCP | ' + fmt(audits['largest-contentful-paint']?.numericValue) + ' ms |\n' +
              '| TBT | ' + fmt(audits['total-blocking-time']?.numericValue) + ' ms |\n' +
              '| CLS | ' + (audits['cumulative-layout-shift']?.numericValue ?? 'N/A') + ' |\n' +
              '| SI | ' + fmt(audits['speed-index']?.numericValue) + ' ms |\n';
            fs.writeFileSync(process.env.GITHUB_STEP_SUMMARY, md, { flag: 'a' });
            console.log(md);
          EOF

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
