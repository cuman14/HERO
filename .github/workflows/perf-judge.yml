name: Judge Performance

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/judge/**'
      - 'libs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: team_sMmJmobd92vIBFKdJ2KxbtcE
  VERCEL_PROJECT_ID: prj_fdR9nYPXdOMWgeCoWXkZWkYvNPDv

jobs:
  bundle-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build judge app
        run: npx nx build judge --configuration=production

      - name: Generate bundle report (visualizer)
        run: |
          mkdir -p perf-reports
          npx vite-bundle-visualizer --config apps/judge/vite.config.mts \
            -o perf-reports/bundle-report.html

      - name: Generate bundle summary
        run: |
          node << 'EOF'
            const fs = require('fs');
            const path = require('path');
            const zlib = require('zlib');
            const dir = 'dist/apps/judge/assets';
            const files = fs.readdirSync(dir).filter(f => /\.(js|css)$/.test(f));
            let md = '## Bundle Report\n\n| Chunk | Size | Gzip |\n|-------|------|------|\n';
            let totalRaw = 0, totalGzip = 0;
            files.sort().forEach(f => {
              const buf = fs.readFileSync(path.join(dir, f));
              const rawKB = buf.length / 1024;
              const gzipKB = zlib.gzipSync(buf).length / 1024;
              const name = f.replace(/-[a-zA-Z0-9_]+(-[a-z]+)?\.([a-z]+)$/, (m, s, ext) => '-*.' + ext);
              md += '| ' + name + ' | ' + rawKB.toFixed(1) + ' KB | ' + gzipKB.toFixed(1) + ' KB |\n';
              totalRaw += rawKB;
              totalGzip += gzipKB;
            });
            md += '| **Total** | **' + totalRaw.toFixed(1) + ' KB** | **' + totalGzip.toFixed(1) + ' KB** |\n';
            fs.writeFileSync('perf-reports/summary.md', md);
            console.log(md);
          EOF

      - name: Upload bundle reports
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report-${{ github.sha }}
          path: perf-reports/
          retention-days: 90

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build judge app
        run: npx nx build judge --configuration=production

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          cp apps/judge/vercel.json dist/apps/judge/vercel.json
          cd dist/apps/judge
          vercel --token=${{ secrets.VERCEL_TOKEN }} --scope=team_sMmJmobd92vIBFKdJ2KxbtcE > /tmp/vercel-output.txt 2>&1
          cat /tmp/vercel-output.txt
          DEPLOY_URL=$(grep -oP 'https?://[^\s"]+\.vercel\.app' /tmp/vercel-output.txt | head -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Run Lighthouse CI against Vercel preview
        run: npx lhci autorun --upload.target=temporary-public-storage --url=${{ steps.deploy.outputs.url }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
