name: Performance - Judge App

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: team_sMmJmobd92vIBFKdJ2KxbtcE

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build judge app
        run: npx nx build judge --configuration=production

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          mkdir -p dist/apps/judge/.vercel
          cat > dist/apps/judge/.vercel/project.json << 'EOF'
          {"projectId":"prj_fdR9nYPXdOMWgeCoWXkZWkYvNPDv","orgId":"team_sMmJmobd92vIBFKdJ2KxbtcE"}
          EOF
          cp apps/judge/vercel.json dist/apps/judge/vercel.json
          cd dist/apps/judge
          npx vercel --public --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /tmp/vercel-output.txt
          cat /tmp/vercel-output.txt
          DEPLOY_URL=$(grep -oP '(https?://[^\s"]+)\.vercel\.app' /tmp/vercel-output.txt | head -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Run Lighthouse CI against Vercel preview
        run: npx lhci autorun --collect.url=${{ steps.deploy.outputs.url }} --collect.startServerCommand= --upload.target=temporary-public-storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
