name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: team_sMmJmobd92vIBFKdJ2KxbtcE

jobs:
  detect-changes:
    name: Detect affected apps
    runs-on: ubuntu-latest
    outputs:
      judge: ${{ steps.affected.outputs.judge }}
      admin: ${{ steps.affected.outputs.admin }}
      leaderboard: ${{ steps.affected.outputs.leaderboard }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect affected projects
        id: affected
        run: |
          AFFECTED=$(npx nx affected --base=origin/main~1 --head=HEAD --plain || echo "")

          if [ -z "$AFFECTED" ]; then
            echo "No changes detected, defaulting to judge"
            echo "judge=true" >> $GITHUB_OUTPUT
            echo "admin=false" >> $GITHUB_OUTPUT
            echo "leaderboard=false" >> $GITHUB_OUTPUT
          else
            echo "judge=$(echo $AFFECTED | grep -q 'judge' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
            echo "admin=$(echo $AFFECTED | grep -q 'admin' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
            echo "leaderboard=$(echo $AFFECTED | grep -q 'leaderboard' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          fi

  deploy-judge:
    name: Deploy judge (PWA)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.judge == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build judge
        run: npx nx build judge --configuration=production

      - name: Install latest Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy judge to Vercel
        run: |
          cd dist/apps/judge
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-admin:
    name: Deploy admin
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: npx nx build admin --configuration=production

      - name: Install latest Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy admin to Vercel
        run: |
          cd dist/apps/admin/browser
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-leaderboard:
    name: Deploy leaderboard (Astro)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.leaderboard == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build leaderboard
        run: npx nx build leaderboard

      - name: Install latest Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy leaderboard to Vercel
        run: |
          cd dist/apps/leaderboard
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
