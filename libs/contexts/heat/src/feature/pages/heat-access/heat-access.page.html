<div
  class="split-screen-container bg-hero-bg font-sans text-slate-200 antialiased selection:bg-violet-600/30"
>
  <!-- Top Section: Logo and Heat Code -->
  <section class="flex-1 flex flex-col items-center justify-center px-6">
    <header class="mb-12 flex flex-col items-center">
      <div class="flex items-center gap-3 mb-2 max-w-20">
        <img src="logo.svg" alt="H.E.R.O Logo" class="w-full" />
      </div>
      <p
        class="font-mono text-2xl font-bold tracking-[0.2em] text-slate-400 dark:text-slate-500 uppercase"
      >
        H.E.R.O
      </p>
    </header>

    <div class="w-full max-w-sm">
      <lib-input
        id="heat-code"
        label="Código de Heat"
        [value]="heatCode()"
        status="success"
        icon="check-circle"
      />
    </div>
  </section>

  <!-- Bottom Section: Judge Identification -->
  <section
    class="flex-1 flex flex-col items-center justify-center px-6 bg-hero-bg"
  >
    <div class="w-full max-w-sm space-y-8">
      <div class="space-y-6">
        <lib-input
          id="judge-name"
          label="Nombre del Juez"
          placeholder="Ej: María López"
          [value]="judgeName()"
          [status]="judgeName() ? 'active' : 'neutral'"
          (valueChange)="updateJudgeName($event)"
        />
        <p class="text-sm text-slate-400 px-8">
          Confirme su nombre para acceder al panel de puntuación del evento.
        </p>
        <lib-button
          [loading]="isSubmitting()"
          [disabled]="!judgeName()"
          class="w-full"
          (clicked)="onSignIn()"
        >
          Iniciar Sesión
          <lib-icon name="arrow-right" iconClass="w-5 h-5 font-bold" />
        </lib-button>
      </div>

      <!-- Footer: Connection Status -->
      <div class="flex items-center justify-center gap-3 py-4">
        <div
          class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 dark:bg-emerald-500/10 rounded-full border border-emerald-100 dark:border-emerald-500/20"
        >
          <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
          <span
            class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider"
            >Sistema Conectado</span
          >
        </div>
      </div>
    </div>
  </section>
</div>
